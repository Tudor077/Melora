<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melora — Download</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #1db954;
      --accent-dim: #166e34;
      --danger: #e34040;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: -.3px; color: var(--accent); }
    nav a { color: var(--muted); text-decoration: none; font-size: .9rem; }
    nav a:hover { color: var(--text); }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 80px 40px 60px;
      max-width: 640px;
      margin: 0 auto;
    }
    .eyebrow {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -.04em;
      margin-bottom: 16px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* ── DOWNLOAD CARD ── */
    .download-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      margin: 0 auto 80px;
      text-align: left;
    }
    .version-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 99px;
      margin-bottom: 20px;
    }
    .version-badge .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }
    .card-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .card-date { color: var(--muted); font-size: .85rem; margin-bottom: 24px; }

    .release-notes {
      list-style: none;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .release-notes li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: .9rem;
      color: var(--muted);
      line-height: 1.4;
    }
    .release-notes li::before {
      content: "✓";
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { opacity: .9; }
    .btn-primary.disabled {
      background: var(--surface2);
      color: var(--muted);
      cursor: not-allowed;
      border: 1px solid var(--border);
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--muted); }
    .btn-icon { font-size: 1.1rem; }

    /* ── HISTORY ── */
    .section { max-width: 640px; margin: 0 auto; padding: 0 40px 80px; }
    .section h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: .75rem;
    }
    .history-list { display: flex; flex-direction: column; gap: 2px; }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      gap: 16px;
    }
    .history-item:not(:last-child) { margin-bottom: 2px; }
    .history-meta { display: flex; align-items: center; gap: 12px; }
    .history-version { font-weight: 700; font-size: .95rem; }
    .history-label {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .history-label.latest { background: var(--accent-dim); color: var(--accent); border-color: transparent; }
    .history-date { color: var(--muted); font-size: .82rem; }
    .history-dl {
      color: var(--accent);
      text-decoration: none;
      font-size: .85rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .history-dl:hover { text-decoration: underline; }
    .history-dl.unavailable { color: var(--muted); cursor: default; pointer-events: none; }

    /* ── FOOTER ── */
    footer {
      margin-top: auto;
      padding: 24px 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: .8rem;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<nav>
  <span class="logo">Melora</span>
  <a href="index.html">← Back to app</a>
</nav>

<div class="hero">
  <p class="eyebrow">Download</p>
  <h1>Get Melora for Windows</h1>
  <p class="subtitle">
    Hourly &amp; daily music discovery powered by Spotify.<br />
    Sorted by BPM, genre, vibe, and more.
  </p>
</div>

<div id="latest-card" class="download-card">
  <!-- populated by JS -->
</div>

<div class="section">
  <h2>Release History</h2>
  <div id="history-list" class="history-list">
    <!-- populated by JS -->
  </div>
</div>

<footer>
  <span>© 2026 Melora</span>
  <span>Built with <a href="https://tauri.app" target="_blank">Tauri</a> &amp; <a href="https://react.dev" target="_blank">React</a></span>
</footer>

<script>
  const VERSIONS_URL = "./releases/versions.json";

  const windowsIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.551H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>`;
  const dlIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

  async function load() {
    let data;
    try {
      const res = await fetch(VERSIONS_URL);
      data = await res.json();
    } catch {
      document.getElementById("latest-card").innerHTML =
        `<p style="color:var(--muted);text-align:center">Could not load release data.</p>`;
      return;
    }

    const latest = data.releases.find(r => r.version === data.latest) || data.releases[0];
    renderLatest(latest);
    renderHistory(data.releases, data.latest);
  }

  function renderLatest(r) {
    const hasWin = !!r.downloads?.windows;
    document.getElementById("latest-card").innerHTML = `
      <span class="version-badge"><span class="dot"></span>Latest — v${r.version}</span>
      <p class="card-title">Melora ${r.label || "v" + r.version}</p>
      <p class="card-date">Released ${formatDate(r.date)}</p>
      <ul class="release-notes">
        ${r.notes.map(n => `<li>${n}</li>`).join("")}
      </ul>
      <div class="btn-group">
        ${hasWin
          ? `<a class="btn btn-primary" href="${r.downloads.windows}">
               <span class="btn-icon">${windowsIcon}</span> Download for Windows (.exe)
             </a>`
          : `<span class="btn btn-primary disabled">
               <span class="btn-icon">${windowsIcon}</span> Windows build coming soon
             </span>`
        }
      </div>
    `;
  }

  function renderHistory(releases, latest) {
    document.getElementById("history-list").innerHTML = releases.map(r => {
      const isLatest = r.version === latest;
      const hasWin = !!r.downloads?.windows;
      return `
        <div class="history-item">
          <div class="history-meta">
            <span class="history-version">v${r.version}</span>
            <span class="history-label ${isLatest ? "latest" : ""}">${isLatest ? "Latest" : r.label || "Stable"}</span>
            <span class="history-date">${formatDate(r.date)}</span>
          </div>
          ${hasWin
            ? `<a class="history-dl" href="${r.downloads.windows}">${dlIcon} .exe</a>`
            : `<span class="history-dl unavailable">Not yet built</span>`
          }
        </div>
      `;
    }).join("");
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
  }

  load();
</script>
</body>
</html>
